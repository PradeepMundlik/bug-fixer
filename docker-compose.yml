version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: bugfixer-postgres
    environment:
      POSTGRES_DB: bugfixer
      POSTGRES_USER: bugfixer_admin
      POSTGRES_PASSWORD: bugfixer
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bugfixer_admin -d bugfixer"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: bugfixer-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
