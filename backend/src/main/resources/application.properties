spring.application.name=bug-fixer-backend

# PostgreSQL (running via Docker - see docker-compose.yml)
spring.datasource.url=jdbc:postgresql://localhost:5433/bugfixer
spring.datasource.username=bugfixer_admin
spring.datasource.password=bugfixer
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080

# Multipart upload — allow large codebases (up to 500 MB)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# AI service (used in later days)
ai.service.url=http://localhost:8000
